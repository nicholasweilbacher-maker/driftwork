<style>
  :root {
    --vec:      #00ffa3;   /* phosphor sea-green vector */
    --vec-dim:  #0a6e4d;
    --vec-far:  #064231;
    --hot:      #aaffe6;   /* near-white highlight */
    --warn:     #ff2d6b;   /* danger red-pink */
    --gold:     #ffd166;   /* the beacon / treasure */
    --ink:      #02060a;   /* near-black water */
    --panel-bg: rgba(2,11,9,0.975);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(ellipse at 50% 40%, #04130f 0%, var(--ink) 70%, #000 100%);
    color: var(--vec);
    font-family: 'VT323', monospace;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  /* CRT scanlines + flicker, shared driftwork signature */
  body::before {
    content:''; position: fixed; inset: 0; pointer-events: none; z-index: 60;
    background: repeating-linear-gradient(to bottom,
      transparent 0, transparent 2px, rgba(0,0,0,0.16) 2px, rgba(0,0,0,0.16) 3px);
  }
  body::after {
    content:''; position: fixed; inset: 0; pointer-events: none; z-index: 61;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  }

  .wrap { width: 100%; max-width: 720px; padding: 10px 10px 4px; display: flex; flex-direction: column; align-items: center; }

  .topbar { width: 100%; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .topbar .ttl { font-family: 'Press Start 2P', monospace; font-size: clamp(.55rem,2.2vw,.8rem); color: var(--vec); letter-spacing: 1px; text-shadow: 0 0 8px var(--vec); }
  .topbar .chap { font-size: 1rem; color: var(--vec-dim); letter-spacing: 2px; }
  .topright { display: flex; align-items: center; gap: 12px; }
  .sndbtn { font-family: 'VT323', monospace; font-size: 1rem; color: var(--vec); background: rgba(0,40,30,0.35); border: 1px solid var(--vec-dim); border-radius: 4px; padding: 3px 9px; cursor: pointer; letter-spacing: 1px; text-shadow: 0 0 6px var(--vec); }
  .sndbtn:hover { background: rgba(0,90,66,0.45); }
  .sndbtn.muted { color: var(--vec-dim); text-shadow: none; opacity: .7; }

  /* Viewport stack */
  .screen { position: relative; width: 100%; aspect-ratio: 4/3; max-height: 60vh; border: 2px solid var(--vec-dim); border-radius: 6px; background: #000; box-shadow: 0 0 24px rgba(0,255,163,0.15), inset 0 0 60px rgba(0,0,0,0.9); overflow: hidden; }
  #view { position: absolute; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; }

  /* small auto-map, graph-paper nod */
  #map { position: absolute; top: 8px; right: 8px; width: 78px; height: 78px; border: 1px solid var(--vec-dim); background: rgba(0,10,8,0.6); z-index: 5; }
  .mapcap { position: absolute; top: 88px; right: 8px; font-size: .7rem; color: var(--vec-dim); letter-spacing:1px; z-index:5; }

  /* compass / location text */
  .loc { position: absolute; left: 10px; top: 8px; font-size: 1rem; color: var(--vec-dim); letter-spacing: 1px; z-index: 5; text-shadow: 0 0 6px rgba(0,0,0,1); }

  /* persistent exits + beacon bearing readout */
  #exits { position: absolute; left: 0; right: 0; bottom: 7px; z-index: 5; display: flex; gap: 16px; justify-content: center; align-items: flex-end; pointer-events: none; font-size: 1.05rem; letter-spacing: 1px; }
  #exits .ex { display: flex; flex-direction: column; align-items: center; line-height: 1; }
  #exits .ex small { font-size: .62rem; margin-top: 2px; letter-spacing: 1px; }
  #exits .ex.on { color: var(--hot); text-shadow: 0 0 9px var(--vec); }
  #exits .ex.off { color: #0c3528; opacity: .55; }
  #exits .beac { color: var(--gold); text-shadow: 0 0 9px var(--gold); font-size: .95rem; align-self: center; }
  /* keep the in-world readouts from bleeding through story/menu overlays */
  .screen.busy .loc, .screen.busy #exits { opacity: 0; }

  /* HUD: oil + nerve gauges */
  .hud { width: 100%; display: flex; gap: 12px; margin: 8px 0 4px; }
  .gauge { flex: 1; }
  .gauge .lab { font-size: .85rem; letter-spacing: 1px; display: flex; justify-content: space-between; color: var(--vec-dim); }
  .gauge .bar { height: 12px; border: 1px solid var(--vec-dim); margin-top: 2px; background: #02110d; position: relative; overflow: hidden; }
  .gauge .fill { height: 100%; width: 100%; transition: width .35s ease; }
  #oilFill { background: linear-gradient(90deg, var(--gold), #ff8a00); box-shadow: 0 0 10px var(--gold); }
  #nerveFill { background: linear-gradient(90deg, var(--vec), var(--hot)); box-shadow: 0 0 10px var(--vec); }
  .gauge.low .fill { background: linear-gradient(90deg, var(--warn), #ff7aa0) !important; box-shadow: 0 0 12px var(--warn) !important; }

  /* On-screen controls */
  .pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 460px; margin: 8px 0 14px; }
  .btn { font-family: 'Press Start 2P', monospace; font-size: .85rem; color: var(--vec); background: rgba(0,40,30,0.35); border: 2px solid var(--vec-dim); border-radius: 6px; padding: 16px 0; cursor: pointer; text-shadow: 0 0 6px var(--vec); transition: transform .05s, background .12s, box-shadow .12s; }
  .btn:hover { background: rgba(0,80,60,0.4); box-shadow: 0 0 14px rgba(0,255,163,.3); }
  .btn:active { transform: translateY(2px); background: rgba(0,255,163,.18); }
  .btn small { display:block; font-family:'VT323',monospace; font-size:.95rem; color: var(--vec-dim); margin-top: 5px; letter-spacing:1px; text-shadow:none; }
  .hintline { font-size: .95rem; color: var(--vec-dim); letter-spacing: 1px; text-align: center; margin-bottom: 14px; }
  .hintline b { color: var(--vec); }

  /* Overlays: title, comic panels, encounters. Sized to never scroll within the screen. */
  .overlay { position: absolute; inset: 0; z-index: 40; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 14px 16px; background: var(--panel-bg); backdrop-filter: blur(2px); overflow: hidden; }
  .overlay.hidden { display: none; }
  .overlay h1 { font-family: 'Press Start 2P', monospace; color: var(--vec); font-size: clamp(.8rem, 3vw, 1.3rem); line-height: 1.4; letter-spacing: 1px; text-shadow: 0 0 14px var(--vec); margin-bottom: 5px; }
  .overlay .sub { color: var(--gold); font-size: 1.1rem; letter-spacing: 3px; margin-bottom: 14px; }
  .overlay p { color: var(--hot); font-size: clamp(.92rem, 2.2vw, 1.18rem); line-height: 1.42; max-width: 42ch; margin: 0 auto 16px; min-height: 2.4em; }
  .overlay .svgwrap { width: min(34vh, 132px); margin: 0 auto 10px; flex: 0 0 auto; }
  .overlay .svgwrap svg { width: 100%; height: auto; filter: drop-shadow(0 0 10px var(--vec)); }
  .start-btn { font-family: 'Press Start 2P', monospace; font-size: .92rem; color: var(--ink); background: var(--vec); border: none; border-radius: 6px; padding: 13px 22px; cursor: pointer; letter-spacing: 1px; box-shadow: 0 0 22px var(--vec); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 14px var(--vec);} 50%{ box-shadow:0 0 30px var(--vec);} }
  .ghost-btn { font-family: 'VT323', monospace; font-size: 1.1rem; color: var(--vec); background: transparent; border: 2px solid var(--vec-dim); border-radius: 6px; padding: 8px 16px; cursor: pointer; letter-spacing: 1px; margin: 4px; }
  .ghost-btn:hover { background: rgba(0,255,163,.12); }
  .panel-nav { font-size: .88rem; color: var(--vec-dim); letter-spacing: 2px; margin-top: 4px; }

  /* Encounter choices */
  .choices { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 430px; margin: 2px auto 0; }
  .choice { font-family: 'VT323', monospace; font-size: 1.08rem; color: var(--vec); background: rgba(0,40,30,0.4); border: 2px solid var(--vec-dim); border-radius: 6px; padding: 8px 13px; cursor: pointer; text-align: left; letter-spacing: .5px; line-height: 1.2; }
  .choice:hover { background: rgba(0,90,66,.5); box-shadow: 0 0 12px rgba(0,255,163,.25); }
  .choice .cost { float: right; color: var(--gold); font-size: .95rem; }
  .choice.locked { opacity: .4; cursor: not-allowed; border-style: dashed; }
  .ename { font-family:'Press Start 2P',monospace; color: var(--warn); font-size: clamp(.74rem,2.6vw,1rem); text-shadow: 0 0 12px var(--warn); margin-bottom: 8px; letter-spacing:1px; }
  #encCanvas { width: min(30vh, 200px); height: auto; aspect-ratio: 5 / 3; display: block; margin: 0 auto 9px; background: radial-gradient(ellipse at 50% 60%, rgba(0,40,30,0.35) 0%, rgba(0,0,0,0) 70%); }

  .foot { font-size: .95rem; color: var(--vec-dim); letter-spacing: 1px; margin: 2px 0 14px; }
  .foot a { color: var(--vec); text-decoration: none; border-bottom: 1px dotted var(--vec-dim); }
  .foot a:hover { color: var(--hot); }

  @media (max-width: 480px) {
    .screen { max-height: 46vh; }
    #map { width: 60px; height: 60px; }
    .btn { padding: 14px 0; font-size: .72rem; }
  }
  /* short windows: shrink overlay art/canvas further so frames still never scroll */
  @media (max-height: 760px) {
    .overlay .svgwrap { width: min(22vh, 104px); margin-bottom: 8px; }
    .overlay p { min-height: 2.1em; margin-bottom: 12px; }
    #encCanvas { width: min(24vh, 168px); margin-bottom: 7px; }
    .choice { padding: 7px 12px; font-size: 1rem; }
  }
</style>

      o.frequency.setValueAtTime(108,n);
      o.frequency.linearRampToValueAtTime(184,n+1.4);
      o.frequency.linearRampToValueAtTime(86,n+3.6);
      o.frequency.linearRampToValueAtTime(150,n+5.2);
      g.gain.linearRampToValueAtTime(0.075,n+0.7);
      g.gain.linearRampToValueAtTime(0.0001,n+5.6);
      o.start(n); o.stop(n+5.8);
    }
    schedWhale();
  }
  function schedWhale(){ clearTimeout(whaleTimer); whaleTimer=setTimeout(whaleCall, 9000+Math.random()*12000); }
  function applyProfile(){
    if(!started||!profile)return;
    drone.forEach((o,i)=>{ if(profile.drone[i]!=null) o.frequency.linearRampToValueAtTime(profile.drone[i], t()+2.5); });
    if(droneLP) droneLP.frequency.linearRampToValueAtTime(profile.lp||320, t()+2.5);
    if(profile.pad) startPad();
    if(profile.leviathan) leviathan();
    schedMelody();
  }
  function init(){
    if(started) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    ac=new AC(); started=true; if(ac.resume) ac.resume();
    master=ac.createGain(); master.gain.value=muted?0:0.85; master.connect(ac.destination);
    const v=reverb(), vg=ac.createGain(); vg.gain.value=0.36; v.connect(vg); vg.connect(master); verbIn=v;
    droneGain=ac.createGain(); droneGain.gain.value=0.0001; droneGain.connect(master);
    droneLP=ac.createBiquadFilter(); droneLP.type='lowpass'; droneLP.frequency.value=(profile&&profile.lp)||320; droneLP.connect(droneGain);
    const base=(profile&&profile.drone)||[55,82.5,110];
    base.forEach((f,i)=>{
      const o=ac.createOscillator(); o.type=i===2?'sine':'sawtooth'; o.frequency.value=f;
      const g=ac.createGain(); g.gain.value=i===0?0.18:(i===1?0.10:0.06); o.connect(g); g.connect(droneLP); o.start(); drone.push(o);
      const l=ac.createOscillator(); l.frequency.value=0.05+0.03*i; const lg=ac.createGain(); lg.gain.value=1.5+i; l.connect(lg); lg.connect(o.detune); l.start();
    });
    droneGain.gain.exponentialRampToValueAtTime(0.5, t()+3);
    pulseGain=ac.createGain(); pulseGain.gain.value=0.0001; pulseGain.connect(master);
    pulse=ac.createOscillator(); pulse.type='sine'; pulse.frequency.value=44; pulse.connect(pulseGain); pulse.start();
    ocean(); schedDrip(); schedBell(); heartbeat(); schedMelody(); schedWhale(); applyProfile();
  }
  return {
    init,
    isOn(){ return started && !muted; },
    toggle(){ if(!started){ init(); muted=false; return true; }
      muted=!muted; if(master) master.gain.linearRampToValueAtTime(muted?0:0.85, t()+0.1); return !muted; },
    setProfile(name){ profile=PROFILES[name]||PROFILES.keep; if(started) applyProfile(); },
    step(){ if(!started)return; noise(0.14,'lowpass',430,0.15); tone(70,0.16,'sine',0.10); },
    turn(){ if(!started)return; noise(0.16,'bandpass',900,0.05); },
    bump(){ if(!started)return; tone(58,0.18,'square',0.14); },
    lore(){ if(!started)return; const sc=(profile&&profile.scale)||[880,1320]; [sc[0]||880,(sc[2]||1320)].forEach((f,i)=>tone(f,1.4,'sine',0.05-i*0.02,verbIn,0.02)); },
    encounterStart(){ this.tension(1); if(!started)return; tone(110,0.7,'sawtooth',0.12,verbIn); },
    // a distinct stinger per creature when an encounter opens
    cue(id){ if(!started)return; const T=t();
      switch(id){
        case 'tidewrack': case 'sentry': {            // wet, sinking sea-thing groan
          const o=tone(72,1.5,'sawtooth',0.18,verbIn,0.02); o.frequency.exponentialRampToValueAtTime(38,T+1.4);
          noise(0.6,'lowpass',300,0.12,verbIn); break; }
        case 'mapwraith': {                           // dry paper rustle + whisper
          for(let i=0;i<6;i++) setTimeout(()=>noise(0.08,'highpass',2400,0.05),i*65);
          tone(1200,0.5,'sine',0.02,verbIn,0.05); break; }
        case 'mirror': {                              // glassy shimmer cascade
          [1318.5,1568,1760,2093,2349].forEach((f,i)=>setTimeout(()=>tone(f,0.9,'sine',0.045,verbIn,0.004),i*55)); break; }
        case 'courtier': {                            // a soft choral sigh
          [196,233.08,293.66].forEach(f=>tone(f,2.4,'sine',0.05,verbIn,0.35)); break; }
        case 'dream': {                               // warm, hypnotic rising gliss
          const o=tone(220,2.4,'sine',0.07,verbIn,0.15); o.frequency.linearRampToValueAtTime(440,T+2.1);
          const o2=tone(277,2.4,'sine',0.04,verbIn,0.2); o2.frequency.linearRampToValueAtTime(554,T+2.1); break; }
        case 'theking': {                             // a vast subsonic boom + leviathan roar
          const o=tone(46,3.4,'sine',0.42,verbIn,0.02); o.frequency.exponentialRampToValueAtTime(23,T+3.2);
          const r=tone(84,2.8,'sawtooth',0.2,verbIn,0.05); r.frequency.exponentialRampToValueAtTime(40,T+2.6);
          noise(1.3,'lowpass',200,0.16,verbIn); break; }
      } },
    encounterEnd(){ this.tension(0); },
    tension(lv){ if(!started)return;
      pulseGain.gain.linearRampToValueAtTime(lv>0?0.15:0.0001, t()+0.4);
      if(pulse) pulse.frequency.linearRampToValueAtTime(44+lv*12, t()+0.4);
      droneGain.gain.linearRampToValueAtTime(0.5+lv*0.28, t()+0.6); },
    heart(on){ heartOn=on; },
    win(){ if(!started)return; this.tension(0); const sc=(profile&&profile.scale)||[261.6,329.6,392,523.2];
      sc.forEach((f,i)=>setTimeout(()=>tone(f,3.0,'sine',0.15,verbIn,0.03), i*200)); },
    lose(){ if(!started)return; this.tension(0); const o=tone(140,2.4,'sawtooth',0.2,verbIn,0.02);
      o.frequency.exponentialRampToValueAtTime(40,t()+2.2); if(droneGain) droneGain.gain.linearRampToValueAtTime(0.05,t()+2); }
  };
})();

/* --------------------------- GEOMETRY ------------------------------ */
const DEPTH = 4;
let beaconPos = null;   // {x,y} of the chapter goal, for the bearing indicator
function cellAt(x,y){
  if (y<0||y>=GH||x<0||x>=GW) return '#';
  return grid[y][x];
}
function isWall(x,y){ return cellAt(x,y) === '#'; }

// projected frame (passage opening) at distance d
function frame(d){
  const W = V.width, H = V.height, cx = W/2, cy = H/2;
  const k = Math.pow(0.55, d);
  const hw = W * 0.70 * k;
  const hh = H * 0.62 * k;
  return { l: cx-hw, r: cx+hw, t: cy-hh, b: cy+hh };
}

function glow(color, blur){ ctx.strokeStyle = color; ctx.shadowColor = color; ctx.shadowBlur = blur; }

// brighten a base color by a 0..1 luminance; very near surfaces lift toward white
function lite(hex, lum){
  const p = hx(hex);
  let r=p[0]*lum, g=p[1]*lum, b=p[2]*lum;
  if(lum>0.7){ const t=(lum-0.7)/0.3*0.55; r+=(255-r)*t; g+=(255-g)*t; b+=(255-b)*t; }
  return `rgb(${r|0},${g|0},${b|0})`;
}

let animT = 0;          // continuous animation clock (seconds)
let motes = [];         // drifting ambient particles, re-seeded per chapter

function initMotes(){
  motes = [];
  const n = (CH && CH.motes!=null) ? CH.motes : 26;
  for(let i=0;i<n;i++) motes.push({ x:Math.random(), y:Math.random(), z:0.3+Math.random()*0.7, ph:Math.random()*6.28, sp:0.3+Math.random()*0.9 });
}
function withAlpha(hex,a){ const p=hx(hex); return `rgba(${p[0]},${p[1]},${p[2]},${a})`; }

function drawView(t){
  t = t||0;
  const W = V.width, H = V.height, mcx = W/2, mcy = H/2;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);

  const [fx,fy] = FORWARD[player.dir];
  const lx = fy, ly = -fx, rx = -fy, ry = fx;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';

  let dw = DEPTH+1;
  for(let d=1; d<=DEPTH; d++){ if(isWall(player.x+fx*d, player.y+fy*d)){ dw=d; break; } }
  const far = Math.min(dw, DEPTH) + (dw>DEPTH ? 1 : 0);

  drawFloorCeil(far);

  for(let d = Math.min(dw, DEPTH+1); d >= 0; d--){
    if(d>DEPTH && d!==dw) continue;
    const fr = frame(d), fr1 = frame(d+1);
    const dimF = d/DEPTH;
    const lum = Math.max(0.16, 1 - dimF*0.82);
    const cx0 = player.x + fx*d, cy0 = player.y + fy*d;

    if(d===dw){ drawFrontWall(fr, lum, dimF, cx0, cy0, t); continue; }

    if(isWall(cx0+lx, cy0+ly)) drawSidePanel(fr, fr1, 'L', lum, dimF, cx0+lx, cy0+ly, t);
    else                       drawDoorway(fr, fr1, 'L', lum);
    if(isWall(cx0+rx, cy0+ry)) drawSidePanel(fr, fr1, 'R', lum, dimF, cx0+rx, cy0+ry, t);
    else                       drawDoorway(fr, fr1, 'R', lum);

    if(cellAt(cx0,cy0) === 'B') drawGoal(fr1, d, t);
  }

  drawLanternVignette(mcx, mcy);
  drawMotes(t);
  drawJunctionRune(t);
}

// drifting bioluminescent motes: hypnotic ambient particles tinted per chapter
function drawMotes(t){
  if(!motes.length) return;
  const col = (CH && CH.mote) || CH.accent;
  for(const m of motes){
    const px = ((m.x + t*0.012*m.sp) % 1) * V.width;
    const py = ((m.y + Math.sin(t*0.25*m.sp + m.ph)*0.03 + 1) % 1) * V.height;
    const a = (0.10 + 0.20*(0.5+0.5*Math.sin(t*1.4+m.ph))) * m.z;
    const r = 0.6 + m.z*1.7;
    glow(col, 6*m.z); ctx.fillStyle = withAlpha(col, a);
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// ----- decorations: chosen deterministically per wall cell, chapter-specific -----
function hashCell(a,b,c){ return (((a*73856093)^(b*19349663)^((c||0)*83492791))>>>0); }
function pickDecor(wx,wy,faceKey){
  const list = (CH && CH.decor) || [];
  if(!list.length) return null;
  const h = hashCell(wx,wy, faceKey==='F'?7:(faceKey==='L'?1:2));
  if(h % 100 < 60) return null;                 // ~40% of eligible walls bear a decoration
  return list[(h>>4) % list.length];
}
function decorDraw(type, cx, cy, sz, lum, t, wx, wy){
  ctx.lineCap='round'; ctx.lineJoin='round';
  switch(type){
    case 'sconce': {
      const f=0.55+0.45*Math.sin(t*7 + wx*2+wy);
      glow(lite(CH.accent,lum*0.6),5); ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(cx,cy+sz*0.32); ctx.lineTo(cx,cy+sz*0.04); ctx.stroke();
      glow('#ffd166', 9+8*f); ctx.fillStyle=`rgba(255,209,102,${0.45+0.4*f})`;
      ctx.beginPath(); ctx.moveTo(cx, cy-sz*(0.34+0.12*f));
      ctx.quadraticCurveTo(cx+sz*0.15, cy-sz*0.02, cx, cy+sz*0.06);
      ctx.quadraticCurveTo(cx-sz*0.15, cy-sz*0.02, cx, cy-sz*(0.34+0.12*f)); ctx.fill();
      break; }
    case 'chain': {
      const sway=Math.sin(t*1.2+wx)*sz*0.05;
      glow(lite(CH.accent,lum*0.5),4); ctx.lineWidth=1.3;
      for(let i=0;i<5;i++){ const yy=cy-sz*0.5+i*sz*0.24, xx=cx+sway*(i/4);
        ctx.beginPath(); ctx.arc(xx,yy,sz*0.08,0,Math.PI*2); ctx.stroke(); }
      break; }
    case 'barnacle': {
      glow(lite(CH.accent,lum*0.5),3); ctx.lineWidth=1.2;
      for(let i=0;i<5;i++){ const a=i*1.3+wx; ctx.beginPath();
        ctx.arc(cx+Math.cos(a)*sz*0.25, cy+Math.sin(a)*sz*0.22, sz*0.09, 0, Math.PI*1.4); ctx.stroke(); }
      break; }
    case 'chart': {
      const w2=sz*0.7,h2=sz*0.55;
      glow(lite(CH.accent,lum),5); ctx.lineWidth=1.5; ctx.strokeRect(cx-w2/2,cy-h2/2,w2,h2);
      glow(lite(CH.accent,lum*0.5),3); ctx.lineWidth=1; ctx.beginPath();
      for(let r=0;r<3;r++){ const yy=cy-h2/2+(r+1)*h2/4; ctx.moveTo(cx-w2/2,yy);
        for(let x=0;x<=6;x++){ ctx.lineTo(cx-w2/2+x*w2/6, yy+Math.sin(x+r+t)*2); } }
      ctx.stroke();
      const xf=0.5+0.5*Math.sin(t*3+wx);
      glow(withAlpha((CH.goalColor||'#ffd166'),0.5+0.4*xf),8); ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.moveTo(cx-3,cy-3); ctx.lineTo(cx+3,cy+3); ctx.moveTo(cx+3,cy-3); ctx.lineTo(cx-3,cy+3); ctx.stroke();
      break; }
    case 'compass': {
      const sp=t*0.3;
      glow(lite(CH.accent,lum),6); ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(cx,cy,sz*0.32,0,Math.PI*2); ctx.stroke();
      glow(lite('#cfe8ff',lum),8); ctx.lineWidth=1.7;
      for(let a=0;a<4;a++){ const ang=sp+a*Math.PI/2;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(ang)*sz*0.3, cy+Math.sin(ang)*sz*0.3);
        ctx.lineTo(cx+Math.cos(ang+0.4)*sz*0.12, cy+Math.sin(ang+0.4)*sz*0.12); ctx.stroke(); }
      break; }
    case 'inkrune': {
      const f=0.5+0.5*Math.sin(t*2+wx+wy);
      glow(withAlpha(CH.accent,0.45+0.4*f),9); ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(cx-sz*0.22,cy-sz*0.26);
      ctx.bezierCurveTo(cx+sz*0.32,cy-sz*0.1, cx-sz*0.32,cy+sz*0.1, cx+sz*0.22,cy+sz*0.26); ctx.stroke();
      break; }
    case 'niche': {
      glow(lite(CH.accent,lum*0.7),5); ctx.lineWidth=1.6;
      const w2=sz*0.5,h2=sz*0.82;
      ctx.beginPath();
      ctx.moveTo(cx-w2/2,cy+h2/2); ctx.lineTo(cx-w2/2,cy-h2*0.1);
      ctx.quadraticCurveTo(cx,cy-h2*0.62,cx+w2/2,cy-h2*0.1); ctx.lineTo(cx+w2/2,cy+h2/2); ctx.stroke();
      const f=0.4+0.35*Math.sin(t*1.5+wx);
      glow(withAlpha((CH.goalColor||'#ffd166'),0.3+0.3*f),7); ctx.lineWidth=1.3;
      ctx.beginPath(); ctx.arc(cx,cy,sz*0.13,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx-sz*0.05,cy-sz*0.02,sz*0.028,0,Math.PI*2);
      ctx.arc(cx+sz*0.05,cy-sz*0.02,sz*0.028,0,Math.PI*2); ctx.stroke();
      break; }
    case 'rune': {
      const br=1+0.08*Math.sin(t*1.4+wx), gl=0.4+0.35*Math.abs(Math.sin(t*1.4+wx));
      glow(withAlpha((CH.goalColor||'#ffd166'),gl),10); ctx.lineWidth=1.7;
      ctx.beginPath(); ctx.arc(cx,cy,sz*0.3*br,0,Math.PI*2); ctx.stroke();
      for(let a=0;a<6;a++){ const ang=a*Math.PI/3+t*0.2;
        ctx.beginPath(); ctx.moveTo(cx+Math.cos(ang)*sz*0.3*br,cy+Math.sin(ang)*sz*0.3*br);
        ctx.lineTo(cx+Math.cos(ang)*sz*0.12,cy+Math.sin(ang)*sz*0.12); ctx.stroke(); }
      break; }
    case 'bones': {
      glow(lite('#cfe8ff',lum*0.7),4); ctx.lineWidth=2;
      for(const s of [-1,1]){
        ctx.beginPath(); ctx.moveTo(cx-sz*0.25,cy-sz*0.25*s); ctx.lineTo(cx+sz*0.25,cy+sz*0.25*s); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx-sz*0.27,cy-sz*0.27*s,sz*0.05,0,6.28); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx+sz*0.27,cy+sz*0.27*s,sz*0.05,0,6.28); ctx.stroke(); }
      break; }
  }
  ctx.shadowBlur=0;
}

function drawFloorCeil(maxD){
  for(let d=0; d<=maxD; d++){
    const fr = frame(d);
    const lum = Math.max(0.13, 1 - (d/DEPTH)*0.8);
    glow(lite(CH.accent, lum*0.7), 5); ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(fr.l,fr.b); ctx.lineTo(fr.r,fr.b); ctx.stroke();
    glow(lite(CH.accent, lum*0.4), 4);
    ctx.beginPath(); ctx.moveTo(fr.l,fr.t); ctx.lineTo(fr.r,fr.t); ctx.stroke();
    if(d<maxD){
      const f2 = frame(d+1);
      glow(lite(CH.accent, lum*0.55), 4); ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(fr.l,fr.b); ctx.lineTo(f2.l,f2.b);
      ctx.moveTo(fr.r,fr.b); ctx.lineTo(f2.r,f2.b);
      ctx.moveTo(fr.l,fr.t); ctx.lineTo(f2.l,f2.t);
      ctx.moveTo(fr.r,fr.t); ctx.lineTo(f2.r,f2.t);
      ctx.stroke();
    }
  }
}

function drawFrontWall(fr, lum, dimF, wx, wy, t){
  ctx.lineWidth = 2.4; ctx.fillStyle = `rgba(3,26,19,${0.55+0.3*(1-dimF)})`;
  ctx.beginPath(); ctx.rect(fr.l,fr.t,fr.r-fr.l,fr.b-fr.t); ctx.fill();
  glow(lite(CH.accent, lum), 16); ctx.stroke();
  glow(lite(CH.accent, lum*0.4), 4); ctx.lineWidth = 1;
  ctx.save(); ctx.beginPath(); ctx.rect(fr.l,fr.t,fr.r-fr.l,fr.b-fr.t); ctx.clip();
  const h=fr.b-fr.t, step=(fr.r-fr.l)/5;
  ctx.beginPath();
  for(let x=fr.l-h; x<fr.r; x+=step){ ctx.moveTo(x,fr.b); ctx.lineTo(x+h,fr.t); }
  ctx.stroke(); ctx.restore();
  // a decoration mounted on the dead-end wall (front-facing, full motif)
  if(wx!=null){ const type=pickDecor(wx,wy,'F');
    if(type) decorDraw(type, (fr.l+fr.r)/2, (fr.t+fr.b)/2, Math.min(fr.r-fr.l,fr.b-fr.t)*0.8, lum, t, wx, wy); }
}

function drawSidePanel(fr, fr1, side, lum, dimF, wx, wy, t){
  const xO = side==='L'?fr.l:fr.r, xI = side==='L'?fr1.l:fr1.r;
  ctx.lineWidth = 2; ctx.fillStyle = `rgba(4,20,15,${0.5+0.3*(1-dimF)})`;
  ctx.beginPath();
  ctx.moveTo(xO,fr.t); ctx.lineTo(xI,fr1.t); ctx.lineTo(xI,fr1.b); ctx.lineTo(xO,fr.b); ctx.closePath();
  ctx.fill();
  glow(lite(CH.accent, lum), 12); ctx.stroke();
  glow(lite(CH.accent, lum*0.35), 3); ctx.lineWidth = 1;
  const midX=(xO+xI)/2, tT=(fr.t+fr1.t)/2, tB=(fr.b+fr1.b)/2;
  ctx.beginPath(); ctx.moveTo(midX,tT); ctx.lineTo(midX,tB); ctx.stroke();
  // a smaller decoration on the side wall
  if(wx!=null){ const type=pickDecor(wx,wy,side);
    if(type) decorDraw(type, midX, (tT+tB)/2, (fr.b-fr.t)*0.4, lum*0.85, t, wx, wy); }
}

function drawDoorway(fr, fr1, side, lum){
  const xO = side==='L'?fr.l:fr.r, xI = side==='L'?fr1.l:fr1.r;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.moveTo(xO,fr.t); ctx.lineTo(xI,fr1.t); ctx.lineTo(xI,fr1.b); ctx.lineTo(xO,fr.b); ctx.closePath();
  ctx.fill();
  glow(lite('#cfe8ff', lum), 14); ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.moveTo(xI,fr1.t); ctx.lineTo(xI,fr1.b); ctx.stroke();
  glow(lite(CH.accent, lum), 9); ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(xO,fr.t); ctx.lineTo(xI,fr1.t);
  ctx.moveTo(xO,fr.b); ctx.lineTo(xI,fr1.b);
  ctx.stroke();
  const dir = side==='L'? -1 : 1, bx=(xO+xI)/2, yy=(fr.b*0.62+fr1.b*0.38), s=Math.max(6,(fr.b-fr1.b)*0.18+7);
  glow('#cfe8ff', 12); ctx.lineWidth = 2.2;
  ctx.beginPath();
  ctx.moveTo(bx - dir*s, yy-s); ctx.lineTo(bx + dir*s, yy); ctx.lineTo(bx - dir*s, yy+s);
  ctx.stroke();
}

// the chapter goal: a radiant glyph that pulses and slowly turns, tinted per chapter
function drawGoal(fr, d, t){
  const cx=(fr.l+fr.r)/2, cy=(fr.t+fr.b)/2, r=(fr.r-fr.l);
  const col=(CH && CH.goalColor)||'#ffd166', pulse=0.85+0.15*Math.sin(t*2.2);
  glow(col, 26*pulse); ctx.lineWidth=2; ctx.fillStyle=withAlpha(col,0.14);
  ctx.beginPath(); ctx.arc(cx,cy,r*0.28*pulse,0,Math.PI*2); ctx.fill(); ctx.stroke();
  glow(col, 18); ctx.lineWidth=1.4;
  for(let a=0;a<8;a++){ const ang=a*Math.PI/4 + t*0.3;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(ang)*r*0.15, cy+Math.sin(ang)*r*0.15);
    ctx.lineTo(cx+Math.cos(ang)*r*0.42*pulse, cy+Math.sin(ang)*r*0.42*pulse); ctx.stroke(); }
  glow('#fff7d6', 34);
  ctx.beginPath(); ctx.arc(cx, cy, r*0.10, 0, Math.PI*2); ctx.fillStyle=col; ctx.fill();
  ctx.shadowBlur = 0;
}

function drawLanternVignette(cx, cy){
  ctx.shadowBlur = 0;
  const g = ctx.createRadialGradient(cx, cy*1.1, V.height*0.05, cx, cy, V.width*0.62);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(0.6,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.82)');
  ctx.fillStyle = g; ctx.fillRect(0,0,V.width,V.height);
  const warm = (CH && CH.lantern) || 'rgba(255,209,102,';
  const lg = ctx.createRadialGradient(cx, V.height*0.98, 4, cx, V.height*0.98, V.height*0.55);
  lg.addColorStop(0, warm+'0.12)'); lg.addColorStop(1, warm+'0)');
  ctx.fillStyle = lg; ctx.fillRect(0,0,V.width,V.height);
}

function drawJunctionRune(t){
  let exits=0; for(const [dx,dy] of FORWARD){ if(!isWall(player.x+dx,player.y+dy)) exits++; }
  if(exits<3) return;
  const col=(CH && CH.goalColor)||'#ffd166', cx=V.width/2, y=V.height*0.9, s=9+1.5*Math.sin(t*3);
  glow(col, 12); ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(cx,y-s); ctx.lineTo(cx+s,y); ctx.lineTo(cx,y+s); ctx.lineTo(cx-s,y); ctx.closePath(); ctx.stroke();
  ctx.shadowBlur = 0;
}

// continuous render loop while exploring -> the corridor breathes, flickers, drifts
let playLoop = null, loopT0 = 0;
function nowMs(){ return (typeof performance!=='undefined' && performance.now) ? performance.now() : Date.now(); }
function startPlayLoop(){
  if(playLoop || typeof requestAnimationFrame!=='function') return;
  loopT0 = nowMs();
  (function frame(){
    if(mode!=='play'){ playLoop=null; return; }
    animT = (nowMs()-loopT0)/1000;
    drawView(animT);
    playLoop = requestAnimationFrame(frame);
  })();
}

// persistent readout: which directions are open + which way the beacon lies
function updateExits(fx,fy,lx,ly,rx,ry){
  const el = document.getElementById('exits'); if(!el) return;
  const open=(x,y)=>!isWall(x,y);
  const L=open(player.x+lx,player.y+ly), F=open(player.x+fx,player.y+fy), R=open(player.x+rx,player.y+ry);
  const slot=(on,glyph,label)=>`<span class="ex ${on?'on':'off'}">${glyph}<small>${label}</small></span>`;
  let bear='';
  if(beaconPos){
    const dx=beaconPos.x-player.x, dy=beaconPos.y-player.y;
    const fwd=dx*fx+dy*fy, right=dx*rx+dy*ry;
    const dir = Math.abs(fwd)>=Math.abs(right) ? (fwd>=0?'▲':'▼') : (right>=0?'▶':'◀');
    bear=`<span class="beac">BEACON ${dir}</span>`;
  }
  el.innerHTML = slot(L,'◀','LEFT')+slot(F,'▲','AHEAD')+slot(R,'▶','RIGHT')+bear;
}

/* color blend helper */
function mix(a,b,t){
  const pa=hx(a), pb=hx(b);
  const r=Math.round(pa[0]+(pb[0]-pa[0])*t);
  const g=Math.round(pa[1]+(pb[1]-pa[1])*t);
  const bl=Math.round(pa[2]+(pb[2]-pa[2])*t);
  return `rgb(${r},${g},${bl})`;
}
function hx(c){
  if(c[0]==='#'){ return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]; }
  const m=c.match(/\d+/g); return [ +m[0],+m[1],+m[2] ];
}

/* ----------------------- ENCOUNTER CREATURES ------------------------
   Short looping vector animations shown in the encounter modal. Eerie,
   not gory: slow underwater sway, hollow sockets, a looming sentry.     */
let encAnim = null;
function eglow(c,col,blur){ c.strokeStyle=col; c.shadowColor=col; c.shadowBlur=blur; }

// ---- shared eldritch drawing helpers ----
// a writhing, tapering tentacle drawn segment by segment so it narrows to a point
function tentacle(c, x0, y0, ang, len, segs, width, t, phase, col, gl){
  eglow(c, col, gl);
  let x=x0, y=y0, a=ang;
  for(let i=1;i<=segs;i++){
    a += Math.sin(t*1.6 + phase + i*0.55)*0.40;
    const seg=len/segs, nx=x+Math.cos(a)*seg, ny=y+Math.sin(a)*seg;
    c.lineWidth=Math.max(0.7, width*(1-(i-1)/segs));
    c.beginPath(); c.moveTo(x,y); c.lineTo(nx,ny); c.stroke();
    x=nx; y=ny;
  }
  return {x,y};
}
// a cluster of glowing eyes that blink and drift at different rates
function eyeCluster(c, cx, cy, spread, n, t, col){
  for(let i=0;i<n;i++){
    const a=i*2.399, r=spread*(0.25+0.7*(((i*7)%n)/n));
    const ex=cx+Math.cos(a)*r, ey=cy+Math.sin(a)*r*0.66;
    const open=0.45+0.55*Math.sin(t*1.2 + i*1.7);
    const er=spread*0.13*(0.45+Math.max(0,open));
    c.shadowBlur=0; c.fillStyle='#000'; c.beginPath(); c.arc(ex,ey,er+1.6,0,6.2832); c.fill();
    eglow(c,col,8*Math.max(0.2,open)); c.lineWidth=1.3; c.beginPath(); c.arc(ex,ey,er,0,6.2832); c.stroke();
    c.fillStyle=col; c.beginPath(); c.arc(ex,ey,er*0.42,0,6.2832); c.fill();
  }
  c.shadowBlur=0;
}

// THE TIDEWRACK: an eldritch sea-thing, a barnacled bulk crowned with writhing tentacles, a maw, an eye-cluster
function drawTidewrack(c, cv, t){
  const W=cv.width, H=cv.height, cx=W/2, by=H*0.46, br=1+0.05*Math.sin(t*1.1);
  c.lineCap='round'; c.lineJoin='round';
  // a nest of tentacles rising from the dark
  for(let i=0;i<9;i++){ const off=(i-4)/4;
    tentacle(c, cx+off*W*0.16, H*0.99, -Math.PI/2 + off*0.5, H*(0.55+0.15*Math.abs(off)), 7, 3.4, t, i*0.8, '#00ffa3', 7); }
  // irregular barnacled bulk
  eglow(c,'#0affb0',9); c.lineWidth=2.4;
  c.beginPath();
  for(let a=0;a<=6.2832+0.001;a+=0.2){ const wob=1+0.12*Math.sin(a*3+t*1.6)+0.06*Math.sin(a*7-t);
    const px=cx+Math.cos(a)*W*0.17*wob*br, py=by+Math.sin(a)*H*0.26*wob*br;
    a===0?c.moveTo(px,py):c.lineTo(px,py); }
  c.closePath(); c.stroke();
  // barnacle rings on the hide
  eglow(c,'rgba(0,255,163,0.5)',4); c.lineWidth=1.2;
  for(let k=0;k<6;k++){ const a=k*1.7+t*0.2, rx=cx+Math.cos(a)*W*0.1, ry=by+Math.sin(a)*H*0.14;
    c.beginPath(); c.arc(rx,ry,W*0.018,0,Math.PI*1.6); c.stroke(); }
  // a vertical gill-maw, opening and closing
  const mo=0.4+0.6*Math.abs(Math.sin(t*0.9));
  eglow(c,'rgba(170,255,230,0.6)',8); c.lineWidth=1.6;
  c.beginPath();
  c.moveTo(cx, by+H*0.02); c.quadraticCurveTo(cx+W*0.05*mo, by+H*0.1, cx, by+H*0.18);
  c.quadraticCurveTo(cx-W*0.05*mo, by+H*0.1, cx, by+H*0.02); c.stroke();
  for(let i=-2;i<=2;i++){ c.beginPath(); c.moveTo(cx, by+H*0.06+i*H*0.025); c.lineTo(cx+ (i%2?6:-6), by+H*0.06+i*H*0.025); c.stroke(); }
  // asymmetric eye cluster
  eyeCluster(c, cx-W*0.02, by-H*0.07, W*0.14, 6, t, 'rgba(190,255,235,0.95)');
  c.shadowBlur=0;
}

// THE DROWNED SENTRY: armored, but drowned for centuries: kelp-draped, barnacled, an eldritch sigil burning on the breast
function drawSentry(c, cv, t){
  const W=cv.width, H=cv.height, sway=Math.sin(t*0.7)*2, cx=W*0.40+sway, ground=H*0.97;
  c.lineCap='round'; c.lineJoin='round';
  // the Tideflame flask behind, gold and pulsing
  const fp=0.55+0.45*Math.sin(t*1.6), fx=W*0.80, fy=H*0.52;
  eglow(c,`rgba(255,209,102,${0.45+0.4*fp})`,16); c.lineWidth=2; c.strokeStyle='rgba(255,209,102,0.8)';
  c.beginPath(); c.moveTo(fx-9,fy-8); c.lineTo(fx-9,fy+22); c.lineTo(fx+9,fy+22); c.lineTo(fx+9,fy-8); c.lineTo(fx+4,fy-13); c.lineTo(fx-4,fy-13); c.closePath(); c.stroke();
  c.shadowColor='#ffd166'; c.fillStyle=`rgba(255,209,102,${0.22+0.3*fp})`;
  c.beginPath(); c.arc(fx,fy+10,6.5,0,Math.PI*2); c.fill();
  // helm with crest
  eglow(c,'#00ffa3',8); c.lineWidth=2.2;
  c.beginPath();
  c.moveTo(cx-13,H*0.33); c.lineTo(cx-13,H*0.22); c.quadraticCurveTo(cx,H*0.12,cx+13,H*0.22); c.lineTo(cx+13,H*0.33); c.stroke();
  c.beginPath(); c.moveTo(cx,H*0.12); c.lineTo(cx,H*0.07); c.stroke();   // crest spike
  // visor slit, glowing, occasional dim flicker
  const vf=(Math.sin(t*2.7)>0.86)?0.2:1;
  eglow(c,`rgba(170,255,230,${0.75*vf})`,10); c.lineWidth=3;
  c.beginPath(); c.moveTo(cx-8,H*0.27); c.lineTo(cx+8,H*0.27); c.stroke();
  // torso + pauldrons + legs
  eglow(c,'#00ffa3',7); c.lineWidth=2.2;
  c.beginPath();
  c.moveTo(cx-16,H*0.37); c.lineTo(cx-19,H*0.54); c.lineTo(cx-11,ground);
  c.lineTo(cx+11,ground); c.lineTo(cx+19,H*0.54); c.lineTo(cx+16,H*0.37);
  c.quadraticCurveTo(cx,H*0.31,cx-16,H*0.37); c.stroke();
  // eldritch sigil burning on the breastplate
  const sg=0.4+0.4*Math.sin(t*1.3);
  eglow(c,`rgba(255,209,102,${0.4+0.4*sg})`,9); c.lineWidth=1.4;
  c.beginPath(); c.arc(cx,H*0.46,W*0.035,0,Math.PI*2);
  for(let a=0;a<5;a++){ const an=a*1.2566 - 1.57; c.moveTo(cx,H*0.46); c.lineTo(cx+Math.cos(an)*W*0.035,H*0.46+Math.sin(an)*W*0.035);} c.stroke();
  // kelp strands hanging from the pauldrons, drifting
  eglow(c,'rgba(0,255,163,0.4)',4); c.lineWidth=1.2;
  for(const s of [-1,1]){ let x=cx+s*16,y=H*0.4; c.beginPath(); c.moveTo(x,y);
    for(let k=1;k<=4;k++){ x+=Math.sin(t*1.4+k+s)*3; y+=H*0.07; c.lineTo(x,y);} c.stroke(); }
  // arm down to a planted sword
  eglow(c,'#00ffa3',7); c.lineWidth=2.2;
  c.beginPath(); c.moveTo(cx+16,H*0.41); c.lineTo(cx+22,H*0.62); c.stroke();
  eglow(c,'#aaffe6',7); c.lineWidth=2;
  c.beginPath(); c.moveTo(cx+22,H*0.47); c.lineTo(cx+22,ground); c.stroke();
  c.beginPath(); c.moveTo(cx+14,H*0.53); c.lineTo(cx+30,H*0.53); c.stroke();
  c.shadowBlur=0;
}

function startEncAnim(id){
  const cv=document.getElementById('encCanvas');
  if(!cv || typeof requestAnimationFrame!=='function') return;
  const c=cv.getContext('2d');
  const clock=()=> (typeof performance!=='undefined' ? performance.now() : Date.now());
  const t0=clock();
  (function frame(){
    const t=(clock()-t0)/1000;
    c.clearRect(0,0,cv.width,cv.height);
    const f=CREATURES[id];
    if(f) f(c,cv,t); else drawShade(c,cv,t,'#9fe6ff');
    encAnim=requestAnimationFrame(frame);
  })();
}
function stopEncAnim(){ if(encAnim && typeof cancelAnimationFrame==='function') cancelAnimationFrame(encAnim); encAnim=null; }

// a generic looming shade, fallback for encounters without a bespoke drawer
function drawShade(c, cv, t, col){
  const W=cv.width, H=cv.height, cx=W/2+Math.sin(t*0.6)*3;
  c.lineCap='round'; c.lineJoin='round'; eglow(c,col,9); c.lineWidth=2.2;
  const br=1+0.05*Math.sin(t*1.1);
  c.beginPath();
  c.moveTo(cx-W*0.13, H*0.95);
  c.quadraticCurveTo(cx-W*0.18*br, H*0.4, cx, H*0.2*br);
  c.quadraticCurveTo(cx+W*0.18*br, H*0.4, cx+W*0.13, H*0.95);
  c.stroke();
  eyeCluster(c, cx, H*0.34, W*0.08, 3, t, col);
  c.shadowBlur=0;
}

// THE MAP-WRAITH: a tatter of folded sea-charts, torn pages adrift, an inkblot face that won't settle
function drawMapwraith(c, cv, t){
  const W=cv.width, H=cv.height, cx=W/2+Math.sin(t*0.7)*3;
  c.lineCap='round'; c.lineJoin='round';
  // drifting torn pages around it
  eglow(c,'rgba(120,200,255,0.4)',5); c.lineWidth=1.1;
  for(let i=0;i<5;i++){ const a=t*0.4+i*1.4, px=cx+Math.cos(a)*W*0.3, py=H*0.5+Math.sin(a*1.3)*H*0.3;
    c.beginPath(); c.rect(px-6,py-5,12,10); c.stroke(); }
  // body of stacked folded sheets, skewing as it breathes
  eglow(c,'#4cc9f0',8); c.lineWidth=2;
  for(let i=0;i<6;i++){ const y=H*0.32+i*H*0.11, w=W*0.18-i*3, sk=Math.sin(t*1.3+i)*6;
    c.beginPath(); c.moveTo(cx-w+sk,y); c.lineTo(cx+w+sk,y); c.lineTo(cx+w-sk,y+H*0.09); c.lineTo(cx-w-sk,y+H*0.09); c.closePath(); c.stroke(); }
  // vellum face with a shifting inkblot
  eglow(c,'#9fe6ff',10); c.lineWidth=1.8;
  c.beginPath(); c.rect(cx-W*0.1, H*0.1, W*0.2, H*0.18); c.stroke();
  eglow(c,`rgba(120,200,255,${0.5+0.4*Math.sin(t*2)})`,8); c.lineWidth=1.5;
  c.beginPath();
  for(let a=0;a<=6.2832;a+=0.4){ const wob=1+0.5*Math.sin(a*3+t*2.5); const px=cx+Math.cos(a)*W*0.05*wob, py=H*0.19+Math.sin(a)*H*0.05*wob; a===0?c.moveTo(px,py):c.lineTo(px,py);} c.closePath(); c.stroke();
  c.shadowBlur=0;
}

// THE MIRROR-CARTOGRAPHER: you and your reflection at facing desks, the Lodefire trapped in the glass
function drawMirror(c, cv, t){
  const W=cv.width, H=cv.height, mid=W/2;
  c.lineCap='round'; c.lineJoin='round';
  // the glass, shimmering with faint vertical streaks
  eglow(c,`rgba(160,230,255,${0.5+0.4*Math.sin(t*3)})`,10); c.lineWidth=2;
  c.beginPath(); c.moveTo(mid, H*0.06); c.lineTo(mid, H*0.96); c.stroke();
  eglow(c,'rgba(160,230,255,0.25)',3); c.lineWidth=1;
  for(let i=0;i<4;i++){ const x=mid+(i-1.5)*6; c.beginPath(); c.moveTo(x,H*0.1+Math.sin(t+i)*4); c.lineTo(x,H*0.9); c.stroke(); }
  // two mirrored cartographers, quill in hand, leaning in time
  const lean=Math.sin(t*0.9)*5;
  for(const s of [-1,1]){
    const x=mid+s*W*0.22;
    eglow(c,'#4cc9f0',8); c.lineWidth=2.1;
    c.beginPath(); c.arc(x, H*0.3, W*0.055, 0, Math.PI*2); c.stroke();           // head
    c.beginPath(); c.moveTo(x, H*0.37); c.lineTo(x+s*lean*0.3, H*0.64); c.stroke(); // torso
    c.beginPath(); c.moveTo(x, H*0.46); c.lineTo(x-s*W*0.12, H*0.6); c.stroke();    // arm to glass
    eglow(c,'#9fe6ff',6); c.lineWidth=1.4;
    c.beginPath(); c.moveTo(x-s*W*0.12, H*0.6); c.lineTo(x-s*W*0.16, H*0.52); c.stroke(); // quill
    eglow(c,'#4cc9f0',6); c.lineWidth=1.8;
    c.beginPath(); c.moveTo(x-s*W*0.2, H*0.66); c.lineTo(x+s*W*0.03, H*0.66); c.stroke(); // desk
  }
  // the Lodefire, a caged ember on the glass
  const fp=0.6+0.4*Math.sin(t*1.7);
  eglow(c,`rgba(255,209,102,${0.5+0.4*fp})`,16);
  c.fillStyle=`rgba(255,209,102,${0.32+0.3*fp})`;
  c.beginPath(); c.arc(mid, H*0.58, W*0.032, 0, Math.PI*2); c.fill();
  eglow(c,'rgba(255,209,102,0.5)',6); c.lineWidth=1.2;
  c.beginPath(); c.arc(mid, H*0.58, W*0.05, 0, Math.PI*2); c.stroke();
  c.shadowBlur=0;
}

// THE DROWNED KING: a vast leviathan god, a face of tentacles, a crown of horns, many slow-waking eyes
function drawKing(c, cv, t){
  const W=cv.width, H=cv.height, cx=W/2, br=1+0.04*Math.sin(t*0.6);
  c.lineCap='round'; c.lineJoin='round';
  // throne of coral spines behind
  eglow(c,'rgba(255,209,102,0.35)',6); c.lineWidth=2;
  for(const s of [-1,1]){
    c.beginPath(); c.moveTo(cx+s*W*0.30,H); c.lineTo(cx+s*W*0.24,H*0.16); c.stroke();
    for(let i=0;i<6;i++){ const y=H*0.16+i*H*0.07; c.beginPath(); c.moveTo(cx+s*W*0.24,y); c.lineTo(cx+s*W*0.33,y-H*0.035); c.stroke(); }
  }
  // hulking shoulders and body
  eglow(c,'#ffd166',9); c.lineWidth=2.6;
  c.beginPath();
  c.moveTo(cx-W*0.26,H); c.quadraticCurveTo(cx-W*0.25,H*0.5, cx-W*0.14,H*0.42*br);
  c.quadraticCurveTo(cx,H*0.36,cx+W*0.14,H*0.42*br);
  c.quadraticCurveTo(cx+W*0.25,H*0.5,cx+W*0.26,H); c.stroke();
  // great squashed head
  eglow(c,'#fff1c0',12); c.lineWidth=2.4;
  c.beginPath();
  for(let a=0;a<=6.2832+0.001;a+=0.22){ const px=cx+Math.cos(a)*W*0.135*br, py=H*0.27+Math.sin(a)*H*0.17*br; a===0?c.moveTo(px,py):c.lineTo(px,py);} c.closePath(); c.stroke();
  // a face of tentacles (the cephalopod beard), writhing slowly
  for(let i=0;i<7;i++){ const off=(i-3)/3;
    tentacle(c, cx+off*W*0.07, H*0.36, Math.PI/2 + off*0.45, H*0.26*(1-0.12*Math.abs(off)), 6, 2.8, t*0.8, i*0.7+5, '#ffd166', 9); }
  // crown of horns
  eglow(c,'#fff1c0',10); c.lineWidth=2;
  for(const s of [-1,1]){ c.beginPath();
    c.moveTo(cx+s*W*0.05,H*0.16); c.lineTo(cx+s*W*0.12,H*0.07); c.lineTo(cx+s*W*0.10,H*0.10);
    c.moveTo(cx+s*W*0.12,H*0.07); c.lineTo(cx+s*W*0.17,H*0.04); c.stroke(); }
  c.beginPath(); c.moveTo(cx,H*0.12); c.lineTo(cx,H*0.04); c.stroke(); // central spire
  // many slow-lidded eyes, threatening to fully open
  const wake=0.3+0.5*Math.abs(Math.sin(t*0.35));
  eyeCluster(c, cx, H*0.25, W*0.085, 5, t*0.45, `rgba(255,241,192,${0.6+0.3*wake})`);
  // breathing aura rings
  for(let k=0;k<3;k++){ eglow(c,`rgba(255,209,102,${0.12+0.09*Math.sin(t*0.6+k)})`,18); c.lineWidth=1.1;
    c.beginPath(); c.arc(cx,H*0.42,(W*0.24+k*W*0.06)*br,0,Math.PI*2); c.stroke(); }
  c.shadowBlur=0;
}

// A COURTIER OF THE PALE COURT: a drowned noble, barnacled, kelp-haired, a tall mournful crown and great sad eyes, bowing
function drawCourtier(c, cv, t){
  const W=cv.width, H=cv.height, bow=Math.max(0,Math.sin(t*0.5))*0.12, cx=W/2, headY=H*0.26+bow*H;
  c.lineCap='round'; c.lineJoin='round';
  // robed body tapering to the floor
  eglow(c,'#ffe3a0',8); c.lineWidth=2.2;
  c.beginPath();
  c.moveTo(cx-W*0.13,H*0.99); c.quadraticCurveTo(cx-W*0.08,H*0.5,cx-W*0.05,headY+H*0.06);
  c.lineTo(cx+W*0.05,headY+H*0.06); c.quadraticCurveTo(cx+W*0.08,H*0.5,cx+W*0.13,H*0.99); c.stroke();
  // a high mournful collar/ruff
  eglow(c,'rgba(255,227,160,0.6)',5); c.lineWidth=1.4;
  c.beginPath(); c.arc(cx,headY+H*0.07,W*0.09,Math.PI,0); c.stroke();
  // gaunt head
  eglow(c,'#fff1c0',9); c.lineWidth=2;
  c.beginPath(); c.ellipse?c.ellipse(cx,headY,W*0.05,H*0.07,0,0,6.2832):c.arc(cx,headY,W*0.05,0,6.2832); c.stroke();
  // tall thin crown
  c.beginPath(); for(let i=-2;i<=2;i++){ c.moveTo(cx+i*W*0.018,headY-H*0.06); c.lineTo(cx+i*W*0.018,headY-H*0.11);} c.stroke();
  c.beginPath(); c.moveTo(cx-W*0.04,headY-H*0.06); c.lineTo(cx+W*0.04,headY-H*0.06); c.stroke();
  // two great sad eyes
  const bl=0.5+0.5*Math.sin(t*0.9);
  for(const s of [-1,1]){ c.shadowBlur=0; c.fillStyle='#000'; c.beginPath(); c.arc(cx+s*W*0.022,headY,W*0.016,0,6.2832); c.fill();
    eglow(c,`rgba(255,241,192,${0.4+0.5*bl})`,8); c.lineWidth=1.2; c.beginPath(); c.arc(cx+s*W*0.022,headY,W*0.016,0,6.2832); c.stroke(); }
  // kelp hair drifting
  eglow(c,'rgba(255,227,160,0.4)',4); c.lineWidth=1.1;
  for(const s of [-1,1]){ let x=cx+s*W*0.045,y=headY; c.beginPath(); c.moveTo(x,y);
    for(let k=1;k<=4;k++){ x+=Math.sin(t*1.2+k+s)*2.5; y+=H*0.05; c.lineTo(x,y);} c.stroke(); }
  c.shadowBlur=0;
}

// THE KING'S DREAM: a hypnotic vortex of warm light spiraling around a small green coast and a sun that never set
function drawDream(c, cv, t){
  const W=cv.width, H=cv.height, cx=W/2, cy=H*0.48;
  c.lineCap='round'; c.lineJoin='round';
  // spiraling concentric arcs, slowly rotating, mesmerizing
  for(let r=0;r<7;r++){ const rad=W*0.06+r*W*0.045, a0=t*0.4*(1-r*0.05)+r*0.6;
    eglow(c,`rgba(255,${200-r*8},120,${0.5-r*0.05})`,7); c.lineWidth=1.6;
    c.beginPath(); c.arc(cx,cy,rad,a0,a0+Math.PI*1.4); c.stroke(); }
  // a small green coastline at the calm center: a horizon, a sun, a hill
  eglow(c,'#7fe3a0',8); c.lineWidth=1.6;
  c.beginPath(); c.moveTo(cx-W*0.05,cy+4); c.lineTo(cx+W*0.05,cy+4); c.stroke();
  c.beginPath(); c.moveTo(cx-W*0.05,cy+4); c.quadraticCurveTo(cx,cy-3,cx+W*0.01,cy+4); c.stroke(); // hill
  const sp=0.6+0.4*Math.sin(t*1.5);
  eglow(c,`rgba(255,225,150,${0.5+0.4*sp})`,12); c.fillStyle=`rgba(255,225,150,${0.4+0.3*sp})`;
  c.beginPath(); c.arc(cx+W*0.02,cy-H*0.04,W*0.022,0,6.2832); c.fill();
  c.shadowBlur=0;
}

const CREATURES = {
  tidewrack: drawTidewrack, sentry: drawSentry,
  mapwraith: drawMapwraith, mirror: drawMirror,
  theking: drawKing,
  courtier: drawCourtier,
  dream: drawDream
};

/* ----------------------------- AUTO-MAP ----------------------------- */
function drawMap(){
  const s = MAP.width/GW;
  mctx.clearRect(0,0,MAP.width,MAP.height);
  for(let y=0;y<GH;y++) for(let x=0;x<GW;x++){
    if(!visited.has(x+','+y)) continue;
    const c = cellAt(x,y);
    mctx.fillStyle = c==='#' ? '#063a2a' : (c==='B' ? '#ffd166' : '#0a6e4d');
    mctx.fillRect(x*s, y*s, s-0.5, s-0.5);
  }
  // player arrow
  const px=player.x*s+s/2, py=player.y*s+s/2;
  const [fx,fy]=FORWARD[player.dir];
  mctx.strokeStyle='#aaffe6'; mctx.fillStyle='#aaffe6'; mctx.lineWidth=1.5;
  mctx.beginPath();
  mctx.moveTo(px+fx*s*0.5, py+fy*s*0.5);
  mctx.lineTo(px-fx*s*0.4-fy*s*0.3, py-fy*s*0.4+fx*s*0.3);
  mctx.lineTo(px-fx*s*0.4+fy*s*0.3, py-fy*s*0.4-fx*s*0.3);
  mctx.closePath(); mctx.fill();
}

/* --------------------------- HUD / LOC ------------------------------ */
const DIRNAME=['NORTH','EAST','SOUTH','WEST'];
function updateHUD(){
  oil=Math.max(0,Math.min(maxOil,Math.round(oil)));
  nerve=Math.max(0,Math.min(100,Math.round(nerve)));
  document.getElementById('oilNum').textContent=oil;
  document.getElementById('nerveNum').textContent=nerve;
  document.getElementById('oilFill').style.width=(oil/maxOil*100)+'%';
  document.getElementById('nerveFill').style.width=nerve+'%';
  document.getElementById('oilGauge').classList.toggle('low', oil<=30);
  document.getElementById('nerveGauge').classList.toggle('low', nerve<=25);
  document.getElementById('loc').textContent='FACING '+DIRNAME[player.dir];
  SFX.heart(oil<=25 && mode==='play');
}

/* ----------------------------- RENDER ------------------------------- */
function render(){
  if(mode!=='play' && mode!=='enc') return;
  drawView(animT);
  drawMap(); updateHUD();
  const [fx,fy]=FORWARD[player.dir], lx=fy, ly=-fx, rx=-fy, ry=fx;
  updateExits(fx,fy,lx,ly,rx,ry);
  if(mode==='play') startPlayLoop();   // keep the corridor animating while exploring
}

/* ---------------------------- MOVEMENT ------------------------------ */
function turn(dd){ if(mode!=='play')return; player.dir=(player.dir+dd+4)%4; SFX.turn(); render(); }
function step(sign){
  if(mode!=='play')return;
  const [fx,fy]=FORWARD[player.dir];
  const nx=player.x+fx*sign, ny=player.y+fy*sign;
  if(isWall(nx,ny)){ bump(); return; }
  player.x=nx; player.y=ny;
  SFX.step();
  spendOil(1);
  mark();
  render();
  if(mode!=='play') return;   // oil ran out this step -> game over already fired
  checkTrigger();
}
function strafe(sign){ // sign -1 left, +1 right
  if(mode!=='play')return;
  const [fx,fy]=FORWARD[player.dir];
  const sx = -fy*sign, sy = fx*sign;
  const nx=player.x+sx, ny=player.y+sy;
  if(isWall(nx,ny)){ bump(); return; }
  player.x=nx; player.y=ny; SFX.step(); spendOil(1); mark(); render(); if(mode!=='play')return; checkTrigger();
}
function mark(){ visited.add(player.x+','+player.y);
  // reveal neighbors faintly on the chart
  for(const [dx,dy] of FORWARD){ const k=(player.x+dx)+','+(player.y+dy); visited.add(k); }
}
function bump(){ // tiny shake feedback
  SFX.bump();
  const sc=document.querySelector('.screen');
  sc.style.transform='translateX(-3px)'; setTimeout(()=>sc.style.transform='',60);
}
function spendOil(n){ oil-=n; if(oil<=0){ oil=0; updateHUD(); gameOver(); } }

/* ---------------------------- TRIGGERS ------------------------------ */
function checkTrigger(){
  const key=player.x+','+player.y;
  const t=CH.triggers[key];
  if(!t) return;
  if(t.type==='beacon'){ winChapter(); return; }
  if(t.type==='king'){ openEncounter('theking'); return; }   // final choice, not an auto-win
  if(firedTriggers.has(key)) return;
  firedTriggers.add(key);
  if(t.type==='lore'){
    if(t.oil) oil=Math.min(maxOil, oil+t.oil);
    if(t.set) flags.add(t.set);
    updateHUD();
    SFX.lore();
    showComic([{art:t.art||'lantern', text:t.text}], ()=>{ hideOverlays(); mode='play'; render(); });
    mode='comic';
  } else if(t.type==='encounter'){
    openEncounter(t.enc);
  }
}

/* --------------------------- ENCOUNTERS ----------------------------- */
function openEncounter(id){
  mode='enc';
  SFX.encounterStart(); SFX.cue(id);
  const e=ENCOUNTERS[id];
  document.getElementById('encName').textContent=e.name;
  document.getElementById('encText').textContent=e.text;
  const box=document.getElementById('encChoices'); box.innerHTML='';
  e.options.forEach(opt=>{
    const locked = (opt.req==='nerve' && nerve<opt.reqVal) || (opt.req==='flag' && !flags.has(opt.reqFlag));
    const b=document.createElement('button');
    b.className='choice'+(locked?' locked':'');
    let cost='';
    if(opt.cost){ const parts=[]; if(opt.cost.oil)parts.push('-'+opt.cost.oil+' oil'); if(opt.cost.nerve)parts.push('-'+opt.cost.nerve+' nerve'); cost=parts.join(' '); }
    if(opt.req==='flag' && !flags.has(opt.reqFlag)) cost='locked';
    if(opt.req==='nerve' && nerve<opt.reqVal) cost='need '+opt.reqVal+' nerve';
    b.innerHTML=opt.label+(cost?`<span class="cost">${cost}</span>`:'');
    if(!locked) b.onclick=()=>resolveChoice(opt);
    box.appendChild(b);
  });
  showOnly('enc');
  startEncAnim(id);
}
function resolveChoice(opt){
  stopEncAnim();
  if(opt.cost){ if(opt.cost.oil)oil-=opt.cost.oil; if(opt.cost.nerve)nerve-=opt.cost.nerve; }
  if(opt.give==='tideflame'){ oil=maxOil; }
  SFX.encounterEnd();
  updateHUD();
  hideOverlays(); mode='comic';
  showComic([{art: opt.ending?'crown':'lantern', text:opt.result}], ()=>{
    if(opt.ending){ playFinale(opt.ending); return; }   // Chapter III climax choice
    if(oil<=0){ gameOver(); return; }
    hideOverlays(); mode='play'; render();
  });
}

/* ---------------------------- COMIC SYS ----------------------------- */
function showComic(panels, done){
  comicQueue=panels; comicIdx=0; comicDone=done;
  showOnly('comic'); renderPanel();
}
function renderPanel(){
  const p=comicQueue[comicIdx];
  document.getElementById('comicArt').innerHTML = ART[p.art]||'';
  const el=document.getElementById('comicText');
  document.getElementById('comicNav').textContent =
    comicQueue.length>1 ? `${comicIdx+1} / ${comicQueue.length}` : '';
  typeText(el, p.text);
  const btn=document.getElementById('comicNext');
  btn.textContent = comicIdx<comicQueue.length-1 ? 'CONTINUE ▶' : 'ENTER ▶';
}
let typing=null;
function typeText(el, txt){
  clearInterval(typing); el.textContent='';
  let i=0; typing=setInterval(()=>{ el.textContent=txt.slice(0,++i); if(i>=txt.length)clearInterval(typing); },14);
}
function nextPanel(){
  if(typing){ const full=comicQueue[comicIdx].text; const el=document.getElementById('comicText');
    if(el.textContent.length<full.length){ clearInterval(typing); el.textContent=full; return; } }
  comicIdx++;
  if(comicIdx<comicQueue.length){ renderPanel(); }
  else { const d=comicDone; comicDone=null; if(d)d(); }
}

/* ----------------------------- ENDINGS ------------------------------ */
function winChapter(){
  mode='comic';
  SFX.heart(false); SFX.win();
  showComic(CH.outro, ()=>{ mode='end'; showEnding(true); });
}
function playFinale(variant){    // Chapter III: the chosen ending of the trilogy
  mode='comic'; SFX.heart(false); SFX.win();
  const panels=(CH.outroVariants&&CH.outroVariants[variant])||CH.outro||[{art:'dawn',text:'The end.'}];
  showComic(panels, ()=>{ mode='end'; showEnding(true); });
}
function gameOver(){
  mode='end';
  SFX.heart(false); SFX.lose();
  showEnding(false);
}
function showEnding(won){
  const el=document.getElementById('ending');
  if(won){
    const more = CH.next!=null;
    const titleByNum = { 'I':'THE BEACON BURNS', 'II':'THE LODESTAR HOLDS', 'III':'THE HILL IS QUIET' };
    const artByNum   = { 'I':ART.beaconLit, 'II':ART.lodestar, 'III':ART.dawn };
    const nextBtn = more
      ? `<button class="start-btn" onclick="goChapter(${CH.next})">DESCEND ▶ CHAPTER ${CHAPTERS[CH.next].num}</button>`
      : `<div class="panel-nav" style="margin-top:6px;color:var(--gold);letter-spacing:2px">THE TIDEWAX TRILOGY · COMPLETE</div>`;
    el.innerHTML=`<div class="svgwrap">${artByNum[CH.num]||ART.beaconLit}</div>
      <h1>${titleByNum[CH.num]||'COMPLETE'}</h1>
      <p>Chapter ${CH.num} complete. Oil: <b style="color:var(--gold)">${oil}</b> · Nerve: <b style="color:var(--vec)">${nerve}</b>.</p>
      <div>${nextBtn}</div>
      <div style="margin-top:10px"><button class="ghost-btn" onclick="restart()">REPLAY CHAPTER</button>
      <a class="ghost-btn" href="/" style="text-decoration:none">↩ THE ARCADE</a></div>`;
  } else {
    el.innerHTML=`<div class="svgwrap">${ART.rising}</div>
      <h1 style="color:var(--warn);text-shadow:0 0 14px var(--warn)">THE DARK TAKES YOU</h1>
      <p>Your lantern guttered out. The water closed over the light, and the keep kept you.</p>
      <div><button class="start-btn" onclick="restart()">TRY AGAIN ▶</button></div>`;
  }
  showOnly('ending');
}

/* ---------------------------- OVERLAY UI ----------------------------- */
const OVERLAYS=['title','comic','enc','ending'];
const SCREEN = document.querySelector('.screen');
function showOnly(id){ OVERLAYS.forEach(o=>document.getElementById(o).classList.toggle('hidden', o!==id)); SCREEN.classList.add('busy'); }
function hideOverlays(){ OVERLAYS.forEach(o=>document.getElementById(o).classList.add('hidden')); SCREEN.classList.remove('busy'); }

/* ------------------------------ BOOT -------------------------------- */
let curChapter = 1;
function loadChapter(n){
  curChapter = n;
  CH=CHAPTERS[n]; grid=CH.grid; GH=grid.length; GW=grid[0].length;
  document.documentElement.style.setProperty('--vec', CH.accent);
  player={...CH.start};
  oil=maxOil; nerve=100; visited=new Set(); firedTriggers=new Set(); flags=new Set();
  beaconPos=null;
  for(let y=0;y<GH;y++){ const x=grid[y].indexOf('B'); if(x>=0){ beaconPos={x,y}; break; } }
  initMotes();
  SFX.setProfile(CH.music||'keep');
  const tt=document.querySelector('.topbar .ttl'); if(tt) tt.textContent=CH.title;
  const cc=document.querySelector('.topbar .chap'); if(cc) cc.textContent='CHAPTER '+CH.num;
  mark();
}
function startGame(){
  mode='comic';
  showComic(CH.intro, ()=>{ mode='play'; hideOverlays(); render(); });
}
function goChapter(n){ loadChapter(n); startGame(); }
function restart(){ loadChapter(curChapter); startGame(); }

/* ----------------------------- INPUT -------------------------------- */
const soundBtn=document.getElementById('soundBtn');
function refreshSound(on){ soundBtn.textContent = on ? '♪ SOUND ON' : '♪ SOUND OFF'; soundBtn.classList.toggle('muted', !on); }
soundBtn.onclick=()=>{ refreshSound(SFX.toggle()); };
document.getElementById('startBtn').onclick=()=>{ SFX.init(); refreshSound(SFX.isOn()); startGame(); };
document.getElementById('comicNext').onclick=nextPanel;
document.getElementById('bTL').onclick=()=>turn(-1);
document.getElementById('bTR').onclick=()=>turn(1);
document.getElementById('bFW').onclick=()=>step(1);
document.getElementById('bBK').onclick=()=>step(-1);

window.addEventListener('keydown', e=>{
  if(mode==='comic'){ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); nextPanel(); } return; }
  if(mode==='title'){ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); SFX.init(); refreshSound(SFX.isOn()); startGame(); } return; }
  if(mode!=='play') return;
  switch(e.key){
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); step(1); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); step(-1); break;
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); turn(-1); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); turn(1); break;
    case 'q': case 'Q': strafe(-1); break;
    case 'e': case 'E': strafe(1); break;
  }
});

// title art + first paint
document.getElementById('titleArt').innerHTML = ART.beaconDark;
loadChapter(1);
updateHUD();
// faint idle render behind the title so the screen isn't empty
drawView(); drawMap();
</script>
